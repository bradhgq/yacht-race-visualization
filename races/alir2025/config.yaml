# ALIR 2025 — Around Long Island Regatta (48th), Sea Cliff YC — stage-0 DRAFT
# Schema of record: skills/race-viz/references/schemas.md.
# Facts verified at stage 0; see decisions/stage-0-scope.yaml for probes/anomalies.

race:
  name: "Around Long Island Regatta"
  edition: 2025
  slug: alir2025
  organizer_url: "https://www.yachtscoring.com/emenu/50029"   # event site: www.alir.org

tracker:
  vendor: yb                    # YB race id alir25 (pro.yb.tl/alir25); satTrackingUrl now
                                # empty in YS metadata — id verified by fleet/geography/start
                                # ritual instead (stage-0 record)
  path: raw/alir2025_tracks_clean.csv   # produced by trim_tracks.py from the as-fetched
                                        # alir2025_tracks.csv: drops 434 duplicate (boat,epoch)
                                        # rows and trims each boat to its own racing window —
                                        # [division gun - 15 min, finish + 5 min], or for a boat
                                        # that never finished, up to her furthest point along the
                                        # course. Removes pre-start milling and post-finish
                                        # deliveries. 26,177 -> 21,666 rows; fleet max latitude
                                        # 41.922N -> 41.281N (Scarlett's tracker rode to Kingston
                                        # NY after she retired). No boat is dropped.

official_results:
  path: raw/alir2025_results_local.csv   # derived by derive_results_columns.py from
                                         # raw/alir2025_results.csv (as-fetched): adds
                                         # finish_local + retire_reason. The YS export's
                                         # finish_time_utc is EDT WALL CLOCK mislabeled with a
                                         # Z suffix (probe-proven, +4.00h on 5 boats) — the
                                         # derivation strips the fake Z and applies NO shift.
  columns:
    rank: place_overall         # NOTE: per-circle overall (Spinnaker / Non-Spinnaker /
                                # Multihull are scored separately by the organizer)
    name: boat_name
    sail: sail_number
    rating: rating
    elapsed: elapsed_hms
    corrected: corrected_hms
    type: design
    finish_local: finish_local
    division: class_name        # class_name carries the real division; the 'division'
                                # column is uniformly "PHRF" and useless as meta.cls
    class_rank: place_class
    status: finish_status
    retire_reason: retire_reason
  finish_statuses: [AOK]        # observed statuses: AOK / RET / DNC
  untracked_meta_only: []       # no in-scope finisher is untracked (probe: coverage matrix)

entries: { path: raw/alir2025_scratch_sheet.csv }

course:
  type: marks                   # routed DTF via pipeline/route.py
  start: [40.7028, -74.0367]    # SI: line ~0.25 nm NE of Ellis Island, NY Harbor
  finish: [40.8619, -73.6603]   # SI: light on Glen Cove Breakwater, Hempstead Harbor
  official_length_nm: 207.0     # SI: "207 nm for scoring purposes" (ATI course, out of scope: 250)
  finish_radius_nm: 0.4         # NOT the 0.7 default. The fleet-ghost loop applies this radius to
                                # every boat, and Hempstead Harbour's approach doubles back past
                                # the line: at 0.7 nm SEVEN finishers get their ghost track cut
                                # >15 min early (Sound's Great by 110 min). 0.4 nm cuts that to 3.
                                # Per-boat series are unaffected either way (they trim on finish).
  marks:                        # polyline 205.9 nm (delta -1.1 vs official; route.py logs it).
                                # Every leg verified against the sailed fleet envelope: no leg
                                # passes inshore of any racing track (the two land-crossing legs
                                # found at first draft are fixed by the two marks flagged NEW).
    - [40.6060, -74.0450]       # Verrazzano Narrows mid-span (keeps leg 1 in the channel)
    - [40.5281, -74.0094]       # Ambrose Channel Red Bell Q R "14" — the ONE mandatory mark (SI)
    - [40.5500, -73.4000]       # south-shore spine: drafted from the sailed median, because the
    - [40.6400, -73.0500]       #   direct Ambrose->Montauk great circle crosses Long Island
    - [40.7700, -72.6000]       #   (152 of 160 samples inshore, worst -6.7 nm)
    - [40.8600, -72.1000]       # NEW — Moriches/Shinnecock offing. Without it the spine->Montauk
                                #   chord runs over the Amagansett–Napeague ocean beach: ZERO of
                                #   1,198 outbound pings lay north of it, worst clearance -1.5 nm.
    - [41.0600, -71.8450]       # Montauk Point rounding, 0.9 nm SE of the light (every finisher's
                                #   closest approach <=0.66 nm, so the radius rule always fires)
    - [41.1680, -72.2150]       # Plum Gut — 42 of 43 finishers within 0.52 nm. (Yopo took the
                                #   Sluiceway; the two Race crossings were Kitli and Vamonos.)
    - [41.0500, -73.3500]       # mid-Sound, clearing Eatons Neck (fleet return min 40.953)
    - [40.9250, -73.6250]       # NEW — Matinecock/Prospect Point. Without it the run to the line
                                #   cuts Centre Island/Bayville: no return ping lay south of it.
  mark_radius_nm: 1.0
  arrival_search_after_nm: 0    # verified safe: with routed DTF >20 nm the closest any boat comes
                                # to the finish is 12.0 nm — 11+ nm of clearance. No false arrival.

time:
  official_tz: America/New_York
  utc_offset: -4
  tz_label: EDT
  race_start_utc: '2025-07-24T14:30:00+00:00'   # data trim: tracker goes live 10:30 EDT,
                                                # 30 min before the 11:00 first warning
  tz_probe:                     # stage-0 verified (decisions/stage-0-scope.yaml has 5-boat table)
    boat: "Max"
    official_finish_local: '2025-07-25 14:15:50'
    track_epoch_utc: 1753467303   # 2025-07-25T18:15:03Z, 0.14 nm from the breakwater light

scoring:
  system: tod                   # corrected = elapsed - rating * 207.0; verified exact for
  params: { rating_column: rating }   # every AOK boat in both circles (stage-0 probe)
  probe_boats: ["Max", "Daffodil"]    # -18 and NEMA -20: same sec/mi scale, cross-checked

start_method: finish_minus_elapsed   # reproduces warning+5min exactly for all 11 divisions,
                                     # cross-checked vs YB RaceSetup.teams[].start (true UTC);
                                     # YS races[].startTime carries the same EDT-as-Z mislabel
divisions_in_scope:             # the Around Long Island course only; the two Around-the-Islands
                                # circles sail a different 250 nm course and are untracked
  - "Non-Spinnaker Division 1 - Warning  Signal 11:00"   # (sic — double space in source)
  - "Non-Spinnaker Division 2 - Warning Signal 11:10"
  - "Spinnaker Division 4 - Warning Signal 11:20"
  - "Spinnaker Division 5 - Warning Signal 11:30"
  - "Double-Handed Division 7 - Warning Signal 11:40"
  - "Spinnaker Division 9 - Warning Signal 11:50"
  - "Spinnaker Division X - Warning Signal 12:00"
  - "Spinnaker Division 0 - Warning Signal 12:10"
  - "Multihull (NEMA) Division M - Warning Signal 12:20"
client_boat: "Daffodil"         # PIPELINE PIVOT ONLY (build_data pivots stats/groups on one boat;
                                # OPEN_THREADS: hero-less builds unsupported today) — PROPOSED,
                                # owner confirms at the stage-0 stop. Being the pivot does NOT
                                # make Daffodil the protagonist Max is measured against: the two
                                # are co-equal focuses (narrative_framing in the stage-0 record).
reference_boats:                # documentation only (no pipeline consumer today — build_data
                                # reads client_boat and groups). Max appears here as the SECOND
                                # FOCUS, not as a benchmark for Daffodil; the rest benchmark a
                                # focus boat inside its own circle. See the stage-0 record's
                                # focus_boats vs reference_boats split.
  - "Max"                       # co-focus
  - "Habiru YCC"                # default highlight (owner)
  - "Wahoo"                     # Max's own-circle pace benchmark
  - "Phantom"                   # 2nd overall in Max's circle, +4:05
  - "Dolcezza"                  # Non-Spinnaker circle winner — third-circle anchor
tier: 1

name_overrides:
  by_id: {}
  by_name:                      # tracker (YB) name -> results (YS) name. ONLY the suffix cases
                                # belong here: the join normalizer already casefolds, so a
                                # case-only entry would be a no-op for matching while still
                                # rewriting the stored tracker name — which ships as the fleet
                                # ghost's hover label and would read ACADIA next to a chip
                                # reading Acadia. Case is handled by `display` below instead.
    "Habiru": "Habiru YCC"
    "Little Texas": "Little Texas YCC"
    "Unbreakable": "Unbreakable YCC"
  display:                      # results name -> shipped display name
    "PATHFINDER": "Pathfinder"
    "DUET": "Duet"
    "ACTAEA": "Actaea"
    "ACADIA": "Acadia"
    "WANDERER": "Wanderer"
    "SCAPEGOAT": "Scapegoat"
    "Smoke &Mirrors": "Smoke & Mirrors"

groups:                         # dual-focus, NOT a duel (see decisions/stage-0-scope.yaml
                                # narrative_framing): Max gets its own group key so it carries
                                # the same visual weight as the hero rather than sitting in a
                                # comparison bucket. Each chart narrates the two in parallel.
  hero_key: hero                # Daffodil (client_boat / pipeline pivot)
  by_name:
    focus: ["Max"]              # co-focus, equal billing with the hero
    spotlight: ["Habiru YCC"]   # owner-requested default highlight
  by_cls: {}
  by_rank: {}
  default_key: fleet_other
  dnf_key: fleet_dnf

exclude_boats:                  # tracked-only committee vessel; two DNCs with no track.
                                # NOTE: no racing boat is excluded — Scarlett stays in the fleet
                                # and is handled by trim_tracks.py instead (owner, 2026-07-23).
  - "COMMITTEE BOAT"
  - "Wind Song"
  - "Rocksteady"
extra_boats: []

grid: { minutes: 15, end_utc: '2025-07-26T18:45:00+00:00', interpolate_limit: 4 }
                                # last in-scope finisher (Terra Nova) 14:37:11 EDT = 18:37Z + pad
sog: { half_window_s: 900, min_span_s: 600 }
fleet: { resample: 1h, min_points: 5 }
milestones: { start_nm: 200, step_nm: 20 }
finish_pad_min: 3

events: { path: events.yaml }
event_categories: [crew, systems, sail, tactics, insight, milestone]

zone_detection:                 # the western-Sound park is the expected stage-2 candidate
  band_nm: 10
  collapse_frac: 0.5
  min_traversal_hours: 6

finish_spread: { window_min: 30, min_boats: 10 }
noise_floor_min: 10             # PROPOSED (owner confirms): ToD at ~3 s/mi rating uncertainty
                                # x 207 nm ~ 10 min. This floor is load-bearing here: the
                                # Spinnaker circle's top three finish within 4:50 of each other
                                # (Max, Phantom +4:05, Wahoo +4:50) after 27 h, and Max's own
                                # division margin is 4 min — all sub-floor. Doctrine 6 binds the
                                # copy to narrate a rating-scale dead heat, not a sailed margin.

privacy: { build: public }

output:
  dir: out/

pinned_values:                  # PINNED at the stage-2 stop (prime rule 3) — from official results
                                # + hand-verified probes; changing any requires a recorded owner
                                # instruction. Full derivations in tests/regression.json _comment.
  tz_probe: { epoch: 1753467303, rendered: '2025-07-25 14:15' }   # Max's finish-line crossing
  endpoints: { ref: "Max", corrected_min: 357.77, elapsed_min: 350.87 }   # hero(Daffodil) - Max
  module_canaries: {}
  names_present: ["Daffodil", "Max", "Habiru YCC", "Wahoo", "Phantom", "Dolcezza",
                  "Acadia", "Scapegoat", "Smoke & Mirrors", "Sound's Great", "Towhee", "Yopo"]
  names_absent: ["ACADIA", "SCAPEGOAT", "Smoke &Mirrors", "Habiru", "Little Texas", "Unbreakable",
                 "COMMITTEE BOAT", "Wind Song", "Rocksteady"]
  names_meta_only: []
  finstrip_count: 0             # no finish-spread strip: largest in-division cluster is 3 boats
