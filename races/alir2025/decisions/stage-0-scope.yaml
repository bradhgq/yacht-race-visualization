     YS races[].startTime carries the same mislabel; YB epochs are TRUE UTC.
     Consequence: derive_results_columns.py strips the fake Z with NO offset shift."
  - "Name joins (sail-only, proposed): Habiru->Habiru YCC, Little Texas->Little Texas YCC,
     Unbreakable->Unbreakable YCC (YB drops the Youth Challenge Cup suffix)."
  - "Case joins (proposed): Pathfinder/PATHFINDER, Duet/DUET, Actaea/ACTAEA, Acadia/ACADIA,
     Wanderer/WANDERER, Scapegoat/SCAPEGOAT. Display cleanup maps shipped names to mixed case."
  - "'Smoke &Mirrors' missing space in BOTH sources -> display override 'Smoke & Mirrors'."
  - "COMMITTEE BOAT present in tracks only -> exclude_boats."
  - "Wind Song + Rocksteady: DNC, no track -> proposed exclude_boats (the bir2026 'DNC at a
     mooring' precedent). Alternative: keep as meta-only DNF rows — owner's call."
  - "16 UNMATCHED-YS name-join rows are the 16 INACTIVE withdrawn entries + the untracked set above
