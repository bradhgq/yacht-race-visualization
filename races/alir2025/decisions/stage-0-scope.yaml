  probe:
    boat: "Max"
    official_finish_local: "2025-07-25 14:15:50"
    track_epoch_utc: 1753467303       # 2025-07-25T18:15:03Z, 0.14 nm from Glen Cove Breakwater light
    offset: "-4h; confirmed on 5 boats, each within 0.05-0.09 nm of the finish light"

start_method:
  method: finish_minus_elapsed
  verification: "Yields exactly ONE start per division, every one at warning + 5 min: Non-Spin 1
    11:05 · Non-Spin 2 11:15 · Non-Spin 3 11:15 · Spin 4 11:25 · Spin 5 11:35 · Spin 6 11:35 ·
    DH 8 11:45 · Spin 9 11:55 · Spin X 12:05 · Spin 0 12:15 · Multihull M 12:25 EDT. That is 11 of
    12 division labels; Double-Handed Division 7 has no finisher and is not testable from results.
    Cross-checks 1:1 against the nine distinct YB RaceSetup.teams[].start epochs
    (1753369500..1753374300, 600 s apart = 11:05..12:25 EDT), which are TRUE UTC."
  negative_result: "YS races[].startTime is UNUSABLE as a start source here: 10 unnamed rows
    carrying only 7 distinct values, missing 12:05 and 12:15 entirely, and bearing the same
    EDT-as-Z mislabel. YB is the corroborating source; finish-minus-elapsed is the method."
  note: "Staggered per-division starts do NOT break the default method; no pursuit start."

course_model: "marks (routed DTF via pipeline/route.py). Start [40.7028,-74.0367] — the SI line
  ~0.25 nm NE of Ellis Island. South out of NY Harbor under the Verrazzano, leaving Ambrose Channel
  Red Bell Q R '14' [40.5281,-74.0094] to port — the ONE mandatory mark; the SI says all other
  government marks may be disregarded. East along the south shore (three spine waypoints drafted
  from the sailed median, plus a Moriches/Shinnecock offing, because the direct Ambrose->Montauk
  great circle crosses Long Island), round Montauk Point [41.0600,-71.8450], northwest to Plum Gut
  [41.1680,-72.2150], down the Sound via a mid-Sound waypoint and a Matinecock offing, finishing
  [40.8619,-73.6603] off the Glen Cove Breakwater light in Hempstead Harbour.
  Polyline 205.84 nm vs the official scoring distance 207.0 (delta -1.16). All coordinates
  DMS-checked against the SI to within ~5 m. The SI mandates NEITHER Plum Gut nor The Race — the
  gate was the navigator's choice, and the fleet overwhelmingly chose Plum Gut (below)."

sound_entry_gate: "42 of the 43 in-scope finishers passed within 0.52 nm of the Plum Gut
  centerpoint (min 0.08 nm, Smoke & Mirrors). The ONE finisher that did not is Yopo, 3.69 nm off —
  she took the SLUICEWAY, north of Plum Island and south of Great Gull Island (0.10-0.20 nm off the
  gate midpoint at 15:05Z Jul 25), not The Race (3.90 nm). This is determined from the track, not
  inferred. The only Race crossings in the fleet are Kitli (1.46 nm) and Vamonos (1.26 nm), both
  later RET but both crossing while racing. Routing Yopo over the Plum Gut polyline produces no
  DTF artifact: the abeam rule fires cleanly and her distance-remaining stays monotone; the honest
  signal is her cross-track, which steps out to ~7 nm."

