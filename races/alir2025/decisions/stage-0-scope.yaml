  (the ONE mandatory mark, left to port; all other government marks may be disregarded per SI)
  -> 3 south-shore spine waypoints drafted from the sailed median (the direct Ambrose->Montauk
  great circle crosses Long Island) -> Montauk Pt rounding [41.0600,-71.8450] -> Plum Gut
  [41.1680,-72.2150] -> mid-Sound [41.0500,-73.3500] (clears Eatons Neck) -> finish
  [40.8619,-73.6603] (Glen Cove Breakwater light). Draft polyline 203.6 nm vs official scoring
  distance 207.0 (SI: 'considered 207 nm for scoring purposes'; delta -3.4 logged by build).
  SI mandates neither Plum Gut nor The Race — the fleet chose Plum Gut (see anomalies)."

