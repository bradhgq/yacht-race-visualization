# stage-0 — Scope Record — Around Long Island Regatta 2025 (48th), Sea Cliff YC — DRAFT
# (awaiting owner confirmation)
#
# Every number below was recomputed from races/alir2025/raw/ and then independently
# re-verified by adversarial review; claims that review REFUTED are retained as explicit
# corrections rather than quietly deleted, so the ledger shows what was believed and why
# it changed.

acquisition:
  command: "python3 starter/acquisition/fetch_race.py 50029 --yb alir25 --prefix alir2025
    --out-dir races/alir2025/raw/   (run 2026-07-23T02:49:22-0400)"
  yb_id_provenance: "satTrackingUrl is EMPTY in the YS event metadata (allowSatTracking false), so
    the normal YS-hands-you-the-YB-id chain is BROKEN for this event a year on. The id came from the
    owner's July-2025 acquisition session and was re-verified by the full ritual rather than trusted:
    RaceSetup fleet == entry list, first pings in NY Harbor at 14:30Z Jul 24, per-division starts
    == warning + 5 min."
  warnings_raised: 2             # both resolved below, per 'report every warning the run produces'
    # 1. "coverage: 50 tracked boats vs 57 active entries (74 incl. withdrawn)"
    #    -> RESOLVED: the gap is exactly the 6 Around-the-Islands boats + the 2 DNCs.
    #       Around-Long-Island-course coverage is COMPLETE.
    # 2. "28 name-join row(s) need review — the join is a PROPOSAL"
    #    -> RESOLVED: full composition in anomalies; every row class accounted for.
  cross_source_conflicts: "NONE. The owner-provided July-2025 CSVs are row-for-row identical to the
    2026-07-23 re-download (results 57/57, scratch 74/74, tracks 26,177/26,177)."
  source_documents: "Course facts are taken from the 2025 ALIR Sailing Instructions
    (2025_alir_si_v1.3_07.22.25_1200), obtained via the YachtScoring event-documents endpoint for
    event 50029. The SI supplies the start line, the single mandatory mark, the finish line, and
    the 207 nm scoring distance. INDEPENDENT CORROBORATION: the scoring arithmetic reproduces
    official corrected times exactly at 207.0 nm for all 43 in-scope finishers, and at 250.0 nm for
    the 6 Around-the-Islands boats — the distances are confirmed by the data, not only by the PDF."

fleet_count:
  entries_scratch: 74            # 57 ACTIVE + 17 INACTIVE (withdrawn pre-race)
  results_rows: 57               # 51 ALIR-course rows (43 AOK + 6 RET + 2 DNC, 3 circles)
                                 #  + 6 ATI-course rows (all AOK, 2 circles / 3 divisions)
  tracked: 50                    # 49 racers + COMMITTEE BOAT
  in_scope_expectation: 49       # ALIR-course racers with tracks: 43 finishers + 6 RET
  untracked: ["Wind Song (Non-Spin Div 1, DNC)", "Rocksteady (Spin Div 0, DNC)",
              "all 6 Around-the-Islands boats (different 250 nm course, out of scope)"]
  pipeline_check: "A trial build on a scratch copy resolves exactly 43 scored boats + 6 fleet_dnf
    (the RET boats, all tracked) + 6 name-misses (the ATI boats), 49 fleet ghost tracks. Matches."

anomalies:
  - "TZ MISLABEL (adjudicated): results finish_time_utc is EDT wall clock with a spurious Z suffix.
     Probe: track finish-line crossings sit +4.00 h from claimed on 5 boats (Max, Daffodil, Habiru,
     Wahoo, Dolcezza), each 0.05-0.09 nm from the Glen Cove Breakwater light.
     YS races[].startTime carries the same mislabel; YB epochs are TRUE UTC.
     Consequence: derive_results_columns.py strips the fake Z with NO offset shift."
  - "Name-join composition, fully accounted for (74 rows): 45 matched by name, 1 by name+sail,
     3 sail-only (the YCC suffix cases), 1 UNMATCHED-YB (COMMITTEE BOAT), 24 UNMATCHED-YS.
     The 24 decompose as 16 INACTIVE withdrawn entries + 8 ACTIVE-but-untracked (the 6
     Around-the-Islands boats + the 2 DNCs). Every results row resolves to a track or to an
     explicit untracked reason; every tracked name but COMMITTEE BOAT resolves to a results row."
  - "DUPLICATE ENTRY NAME (I4/doctrine 4): the scratch sheet's 74 rows carry only 73 unique names —
     'Dolcezza' is entered twice by two different owners. The racing one is sail 53, Hunter Legend
     37.5, Neill Parker Jr, Non-Spin Div 2, rating 144 — and she WON the Non-Spinnaker circle.
     The withdrawn one is sail 0, Hunter 37, Victor Lee, no class or rating. This is why 16 of 17
     INACTIVE entries appear unmatched: the join correctly bound the tracker to the ACTIVE boat by
     name+sail. No shipped collision, but any future join must key on (name, sail), never name."
  - "Suffix joins (sail-only, proposed and accepted): Habiru->Habiru YCC, Little Texas->Little
     Texas YCC, Unbreakable->Unbreakable YCC (YB drops the Youth Challenge Cup suffix)."
  - "Case-only differences (tracker mixed-case vs results ALL-CAPS): Pathfinder/PATHFINDER,
     Duet/DUET, Actaea/ACTAEA, Acadia/ACADIA, Wanderer/WANDERER, Scapegoat/SCAPEGOAT. Handled by
     name_overrides.display ONLY — the join normalizer casefolds, so a by_name entry would not help
     the match while still rewriting the tracker name that ships as the fleet ghost's hover label
     (it would read ACADIA beside a chip reading Acadia)."
  - "'Smoke &Mirrors' missing space in BOTH sources -> display override 'Smoke & Mirrors'."
  - "COMMITTEE BOAT present in tracks only -> exclude_boats."
  - "Wind Song + Rocksteady: DNC, no track -> exclude_boats (run-log hygiene only; the payload is
     byte-identical either way, since they would otherwise land in the report-only name-miss list)."
  - "SCARLETT'S TRACKER WENT HOME OVERLAND. She turned back off Fire Island on day 1 (RET), and the
     track then runs UP THE HUDSON: 07-25 06:30Z at 41.478/-73.996, 12:00Z at 41.922/-73.966
     (~Kingston NY), parked there for a day. Inside the grid window she contributes 650 pings, 468
     of them north of 41.3N. The fleet's maximum latitude excluding Scarlett is 41.281N; including
     her it is 41.922N — about 38 nm of phantom extent on every map frame. PROPOSED: exclude_boats
     (the bir2026 'DNC at a mooring' precedent), which costs ~4 h of her genuine racing track.
     OWNER DECISION at the stop; doing nothing ships a map with a boat in the Catskills."
  - "438 duplicate (boat_id, epoch) ping rows (26,177 -> 25,739 unique; 434 duplicated keys).
     437 are byte-identical re-emissions. ONE is a genuine position conflict: Pathfinder at
     2025-07-24T19:00:02Z carries both 40.53069/-73.8461 and 40.53070/-73.8462 — 1.1 m apart,
     immaterial. All cadence statistics below are computed AFTER dedup."
  - "COURSE POLYLINE — two legs of the first draft ran over land, found by testing every leg
     against the sailed fleet envelope rather than by eye. (a) spine->Montauk crossed the
     Amagansett-Napeague ocean beach: ZERO of 1,198 outbound pings lay north of it, worst clearance
     -1.5 nm. (b) mid-Sound->finish cut Centre Island/Bayville: no return ping lay south of it.
     FIXED by inserting [40.8600,-72.1000] and [40.9250,-73.6250]. Re-verified: every leg now sits
     seaward of the entire racing fleet, and the polyline improves from 203.63 nm (delta -3.37) to
     205.84 nm (delta -1.16 vs the official 207.0)."
  - "place_overall IS PER-CIRCLE, not fleet-wide. Three boats therefore carry overall rank 1
     (Max in Spinnaker, Dolcezza in Non-Spinnaker, Daffodil in Multihull). The shell's ranked list
     sorts on that field, so it would display '#1' three times. Stage-2 presentation decision:
     rank the unified ladder, or scope the ranked list per circle."
  - "divisions_in_scope has NO code consumer (documentation only). The 6 Around-the-Islands boats
     are kept out solely by being untracked. They are scored over 250 nm, so if one ever acquired a
     track or were added to untracked_meta_only, the pipeline would silently score it at 207 nm and
     be wrong by rating x 43 s. GUARD: untracked_meta_only stays empty for this race."
  - "XTE IS NOT AN OFF-COURSE METRIC ON THIS COURSE MODEL. The three south-shore spine waypoints are
     drafted from the sailed median, not from marks anyone had to round, so legitimate racing tracks
     reach +/-18 nm cross-track (Dark Star -18.0, Sound's Great +17.2, Maggie -15.3). Stage 2 must
     not read XTE here as 'sailed extra distance' the way a point-to-point course allows."
  - "CORRECTION (a claim this record previously carried, refuted on review): there is NO
     Wanderer/Windancer duplicate-sail collision. WANDERER is sail 181, Windancer is USA25, and no
     duplicate sail exists among the 57 ACTIVE entries. The real duplicate hazard is the name
     Dolcezza, above."
  - "CORRECTION (refuted on review): Kitli's and Vamonos' passages through The Race were NOT
     post-retirement deliveries. Both crossed roughly 2 h after rounding Montauk WHILE RACING, with
     routed distance-to-finish falling monotonically through the crossing (Kitli 89.6->75.7 nm,
     Vamonos 88.8->75.0). It was a routing choice. Kitli's tracker simply stops in the eastern Sound
     63.6 nm from the finish; Vamonos sailed the whole Sound to within ~5 nm of the line, then
     parked on a mooring. Do not narrate either as having quit at the gate."
  - "NOISE FLOOR IS LOAD-BEARING FOR THIS RACE'S HEADLINE. Measured corrected margins: Spinnaker
     circle Max 27:02:56, Phantom +4:05, Wahoo +4:50 — three boats inside five minutes after 27
     hours (0.25% of elapsed). Division margins: Spin 0 Max over Wahoo 4:50 · Spin X Habiru YCC over
     ACADIA 6:43 · Non-Spin 2 Dolcezza over Smoke & Mirrors 3:54. The tightest gap anywhere is 37
     seconds (Spin X, DUET over Lucky Luke). At the proposed 10-min floor, BOTH contested circle
     titles and 3 of the 7 contested division titles are sub-floor. Doctrine 6 therefore binds the
     copy: Max's overall win is OFFICIAL and stated as such, but the top three must read as a
     rating-scale dead heat, never as a margin anyone sailed for."
  - "Claims-in-circulation: WindCheck headline reads 'Sound's Great wins 2025 ALIR' while the
     results show that boat 22nd overall in the Spinnaker circle and 1st in Division 5 — likely a
     club/divisional trophy framing. Site is bot-walled (403 to plain fetch); resolve at stage 1
     before it contaminates the narrative."

