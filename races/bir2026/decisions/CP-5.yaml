# CP-5 — Publication ledger — BIR 2026 RAGANA
# The productionization checkpoint: assertions codified, payload split, mobile +
# a11y, hosting wired. Records what shipped, where, and under what privacy terms.
stage: 5
date: "2026-07-07"
confirmed_by: "Brad"

productionization:
  assertions_codified: true          # JOB 1 — CP-4's G1–G5 + A1–A16 as a runnable suite
  test_suite: "races/bir2026/test/regression.test.cjs (+ harness.cjs)"
  test_count: 34                     # 5 goldens + 16 CP-4 + NF1/NF2 + 11 R9 (post-launch owner
                                     # round; was 23 at first deploy — see R9-owner-review.yaml)
  test_runner: "TZ=America/New_York node --test test/regression.test.cjs"
  green_before_and_after: true       # prime rule 5 — non-UTC TZ, green both times
  shell_migration: "declined — see RETROSPECTIVE §shell. The monolith's chart engine
    diverged from the nb2026 shell (different module set); productionized in place
    on the same proven build/split/mobile/a11y pattern instead of merging engines."
  payload_split:
    core_kb: 117                     # 15 default/quick/chip boats + all 58 metas + events/stats — eager
    fleet_kb: 54                     # 57 ghost tracks — lazy, after first paint
    more_kb: 244                     # 42 other boats' tracks — lazy, on demand
    vendor_kb: 1046                  # plotly-basic, separate + cacheable (not inlined)
    lossless: true                   # core ∪ more ∪ fleet reconstructs the FROZEN oracle byte-semantically
    first_chart_interactive: "<2s (core 117KB ≈ 30KB gzip + cached vendor)"
  mobile: "bottom-sheet controls, scroll-safe charts (fixedrange on touch), ~44px targets; verified 375px"
  accessibility:
    - "all controls are real <button>/<select> with aria-pressed / focus-visible"
    - "non-colour division cue: PHRF ghosts dashed on the map; ORC circles vs PHRF squares on the finstrip"
    - "tap-to-inspect gives a text-reachable equivalent of chart hover"
  new_findings:                      # prime rule 5 — caught this session, now assertions
    - "NF1: FROZEN oracle injects Windfall meta-only (PHRF finisher). goldens.json/config.yaml
       still list Windfall under names_absent — that golden is STALE vs the oracle; without
       Windfall the PHRF finstrip band is 22, not the golden 23. Test asserts the oracle."
    - "NF2: display-name override (Zèlèe→Zélée) is applied in the payload; goldens.json
       names_present still shows the raw 'Zèlèe'. Test asserts the applied display name.
       [Both name-lists reconciled in config.yaml at R9 — ledger in R9-owner-review.yaml.]"
    - "R9k: Inisharon (DNF, track but no official time) crashed the race chart on
       All boats + Total view (parseHMS(undefined)) — pre-existing in the approved
       monolith, caught by the R9 code review; now skipped on that chart only."

publication:
  decision: "Host exactly like the nb2026 board — public, full narrative — confirmed by Brad 2026-07-07."
  deploy_choice: "Push dist + deploy (feature-branch PRs for review; final rebuild on silverbox)."
  public_url: "https://hgq.fyi/ragana-block-island-2026/"
  build:
    mode: "python3 build.py --public"
    version_hash: "a846173baf"   # R9 visual pass (2026-07-09); was e01c913d9e at first deploy
    events_included: 14
    events_stripped: 0           # the public frozen/ already excludes the two groundings
  events_never_public:               # prime rule 4 — firsthand-confirmed, NOT in public record
    - "Loki finishes — wins Class 8 — grounds later going home"
    - "Full Tilt finishes, then grounds ~0200 heading home"
  note: >
    Brad chose 'exactly like nb2026' (full public narrative) and, asked directly
    (2026-07-09), confirmed the prime-rule-4 carve-out is sound: the two groundings stay
    out. The public build hard-blocks them (build.py NEVER_PUBLIC) and ships the other 14
    events; the event bodies exist only in the private client record. The private CLIENT
    build (all 16 events) is unchanged and not published.

deploy:
  # consolidated 2026-07-09: everything lives on main in both repos; the interim
  # claude/bir2026-* branches are merged/superseded and deleted
  monorepo:
    repo: "github:bradhgq/yacht-race-visualization"
    branch: "main"
    path: "races/bir2026/  (full source; served build in races/bir2026/dist/)"
    local_checkout: "~/silverdrive/projects/yacht-race-visualization"
  nix_config:
    repo: "github:bradhgq/nix-config"
    branch: "main"
    file: "hosts/silverbox/ragana-dashboard.nix"
    change: "ONE race-viz-site input (nix-config 95d0ced); nginx aliases
      /ragana-newport-bermuda-2026/ → races/nb2026/dist/ and
      /ragana-block-island-2026/ → races/bir2026/dist/"
  ship_an_update: "commit to yacht-race-visualization main (since nix-config 95d0ced one
    race-viz-site input serves EVERY race at that rev), then on silverbox:
    nix flake update race-viz-site && sudo nixos-rebuild switch --flake .#silverbox"
  status: "LIVE at https://hgq.fyi/ragana-block-island-2026/"
