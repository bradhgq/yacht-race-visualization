name: ci

on: [push, pull_request]

jobs:
  # engine unit suites — race-independent, run once
  engine:
    runs-on: ubuntu-latest
    env:
      TZ: America/New_York   # I1: the suite must run under a non-UTC zone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r starter/requirements.txt
      - name: Acquisition decoder regression (offline fixture — network paths stay out of CI)
        working-directory: starter
        run: python3 -m unittest discover -s acquisition/tests
      - name: Routed distance-remaining (marks courses — synthetic geometry suite)
        working-directory: starter
        run: python3 -m unittest tests.test_route

  # every directory under races/ is a race; future races join CI automatically
  discover:
    runs-on: ubuntu-latest
    outputs:
      races: ${{ steps.list.outputs.races }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: echo "races=$(ls -d races/*/ | xargs -n1 basename | jq -R . | jq -sc .)" >> "$GITHUB_OUTPUT"

  race:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        race: ${{ fromJson(needs.discover.outputs.races) }}
    env:
      TZ: America/New_York   # the chain runs the harness under this AND TZ=UTC
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: pip install -r starter/requirements.txt
      # the one-command chain: build_data → race postprocess → harness-gated
      # shell build → harness under TZ=UTC → snapshot compare (tie-exempt).
      # Piecemeal steps are exactly the stale-standalone trap the wrapper kills.
      - name: Full chain (build → harness both TZs → snapshot compare)
        run: python3 starter/build_race.py races/${{ matrix.race }}
