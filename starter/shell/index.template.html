<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<meta name="description" content="{{DESCRIPTION}}">
<link rel="canonical" href="{{URL}}">
<meta property="og:type" content="website">
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="{{OG_DESCRIPTION}}">
<meta property="og:url" content="{{URL}}">
<meta property="og:image" content="{{URL}}og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{TITLE}}">
<meta name="twitter:description" content="{{TWITTER_DESCRIPTION}}">
<meta name="twitter:image" content="{{URL}}og.png">
<link rel="icon" href="favicon.svg?v=__V__" type="image/svg+xml">
<link rel="stylesheet" href="tokens.css?v=__V__">
<link rel="stylesheet" href="styles.css?v=__V__">
<!-- DATA:FETCH — start the core payload download before the deferred scripts arrive -->
<script>window.__CORE_FETCH=fetch('data/core.json?v=__V__').then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()});</script>
<!-- /DATA:FETCH -->
{{SCRIPTS}}
<script src="vendor/plotly-basic-2.35.2.min.js" id="plotlyjs" defer></script>
</head>
<body>
<div class="wrap">

<header class="titleblock">
  <div class="tb-eyebrow">{{TB_EYEBROW}}</div>
  <h1>{{TB_H1}}</h1>
  <div class="tb-sub">{{TB_SUB}}</div>
  <div class="tb-result">{{TB_RESULT}}</div>
  <div class="tzn">{{TB_TZN}}</div>
</header>

<noscript>
  <div class="appstate err">{{NOSCRIPT}}</div>
</noscript>

<main>

<div class="appstate" id="appstate" role="status">{{LOADING}}</div>

<section class="controls" id="controls" aria-label="Boat and overlay controls" hidden>
  <div class="ctl-head">
    <span class="ctl-title">Compare boats &amp; overlays</span>
    <button type="button" class="ctl-collapse" id="ctlCollapse" aria-expanded="true">Hide controls ▲</button>
  </div>
  <div id="ctlBody">
    <div class="ctl-row"><div class="ctl-label big">Groups</div><div class="chips big" id="grpbtns"></div></div>
    <div class="ctl-row" id="filterRow"><div class="ctl-label">Filter</div><div class="chips" id="filterctl"></div></div>
    <div class="ctl-row"><div class="ctl-label">Boats</div><div class="chips" id="chips"></div></div>
    <div id="morePanel" style="display:none;margin:2px 0 10px;padding-top:10px;border-top:1px dashed var(--rule)"></div>
    <div class="ctl-row"><div class="ctl-label">Overlays</div><div class="chips" id="overlays"></div></div>
    <div class="ctl-row">
      <div class="ctl-label">Time axis</div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <div class="axis-toggle" id="axisToggle">
          <button type="button" data-ax="t">By clock time</button>
          <button type="button" data-ax="d">By distance to finish</button>
        </div>
        <span class="ctl-hint">{{CONTROLS_HINT}}</span>
      </div>
    </div>
  </div>
</section>

<!-- phone-width only: the controls live in a bottom sheet behind this bar -->
<div id="scrim" hidden></div>
<button type="button" id="sheetBar" aria-controls="controls" aria-expanded="false" hidden>
  <span class="dot" aria-hidden="true"></span><span id="sheetBarLabel">Boats &amp; overlays</span>
</button>

<section class="kpis" id="kpis" aria-label="Key results"></section>

{{SECTIONS}}

</main>

<footer class="foot">
{{FOOTER}}
</footer>

</div>
</body>
</html>
