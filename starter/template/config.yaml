# Race config template — copy starter/template/ to races/<race>/ and fill in.
# Schema of record: skills/race-viz/references/schemas.md (kept in lockstep with
# this file). Facts about the race live here; judgment lives in the skill;
# narrative lives in events.yaml; code lives in the repo. This template lives
# under starter/ because it is engine-generic — races/ holds only race-specific
# work (owner, 2026-07-16).

race:
  name: ""
  edition: 2026
  slug: ""                      # output filename stem, e.g. nb2026
  organizer_url: ""

tracker:
  vendor: yb                    # yb is the only adapter today; any other vendor means writing
                                # starter/adapters/<v>.py + its test loop at stage 0 first
  path: raw/tracks.csv

official_results:
  path: raw/results.csv
  # Defaults below map the YachtScoring results CSV that acquisition/fetch_race.py
  # downloads. YB-only races (e.g. Newport Bermuda) source results from the
  # organizer's site instead — remap to that file's headers (the worked example's
  # races/nb2026/official_results.csv shows the hand-built shape).
  columns:                      # map canonical field -> your CSV's header
    rank: place_overall
    name: boat_name
    sail: sail_number
    rating: rating
    elapsed: elapsed_hms        # 'Nd HH:MM:SS', 'HH:MM:SS', or YS's 'H:MM:SS' (hours may exceed 24)
    corrected: corrected_hms
    type: design
    finish_local: finish_local  # 'YYYY-MM-DD HH:MM:SS' in the race's official tz.
                                # YS ships finish_time_utc (UTC ISO) — derive this
                                # column with the race's utc_offset before the run.
    division: division
    class_rank: place_class     # official within-class order
    status: finish_status       # YS: AOK/DNF/… — see finish_statuses below
    retire_reason: retire_reason
  finish_statuses: [FIN, AOK]   # status values treated as finishers; anything else is a retirement
  untracked_meta_only: []       # EXPLICIT names: untracked finishers shipped meta-only (no track)

entries: { path: raw/scratch.csv }   # optional scratch sheet

course:
  type: point_to_point          # point_to_point | marks (marks = routed DTF along the polyline)
  start: [0.0, 0.0]             # [lat, lon]
  finish: [0.0, 0.0]
  official_length_nm: 0.0       # from official documents; for marks courses build_data
                                # logs the delta vs the polyline length as a sanity check
  finish_radius_nm: 0.7         # arrival cut for boats without an official finish
  marks: []                     # ordered [lat, lon] turning marks; required when type: marks
  mark_radius_nm: 1.0           # a boat within this of the next mark has rounded it
  arrival_search_after_nm: 0    # out-and-back guard: only search for arrival after this many nm
                                # (conventions documented in pipeline/route.py)

time:
  official_tz: America/New_York
  utc_offset: -4                # fixed offset for the race window (I1: naive local rendering)
  tz_label: EDT
  race_start_utc: ''            # ISO, tz-aware — data trim start (a little before the first warning)
  tz_probe:                     # REQUIRED — stage-0 verified, never assumed
    boat: ""
    official_finish_local: 'YYYY-MM-DD HH:MM:SS'
    track_epoch_utc: 0

scoring:
  system: tot                   # tot | tod | custom
  params: { rating_column: rating }
  probe_boats: ["", ""]         # >=2 must reproduce official corrected within 1 s BEFORE fleet math

# Staggered per-division starts show up in YB RaceSetup.teams[].start and YS
# races[].startTime (both land in fetch_race.py's manifest — and they can
# disagree; ILDR's YS times were placeholders). Record which source you used
# and cross-check it against finish − elapsed before trusting either.
start_method: finish_minus_elapsed   # finish_minus_elapsed | pursuit | staggered | custom
divisions_in_scope: []
client_boat: ""                 # REQUIRED even at Tier 1 — the pipeline pivots on a hero boat;
                                # pick the analysis pivot (fleet-only builds: OPEN_THREADS.md)
reference_boats: []
tier: 1

name_overrides:
  by_id: {}                     # tracker boat_id -> name (duplicate-name split)
  by_name: {}                   # tracker name -> name (syndicate/sponsor cleanup)
  display: {}                   # results name -> shipped display name (I4: dupes by sail number)

groups:                         # chip-group semantics — who's in each is a stage-0/stage-2 judgment
  hero_key: hero                # grp_for precedence: hero > by_name > by_cls > by_rank > default
  by_name: {}                   # e.g. { class6: [names...] } — explicit name lists
  by_cls: {}                    # e.g. { phrf: [PHRF] } — by division label (meta.cls)
  by_rank: {}                   # e.g. { class: [3,7,9], podium: [1,2,3] }
  default_key: fleet_other
  dnf_key: fleet_dnf

exclude_boats: []               # normalized names removed entirely (e.g. a DNC parked at a mooring)
extra_boats: []                 # tracked but unscored, e.g.
                                # - { track_name: X, display: X, type: '...', group: maxi }

grid: { minutes: 15, end_utc: '', interpolate_limit: 4 }
sog: { half_window_s: 900, min_span_s: 600 }
fleet: { resample: 1h, min_points: 5 }
milestones: { start_nm: 600, step_nm: 20 }
finish_pad_min: 3

events: { path: events.yaml }
event_categories: [crew, systems, sail, tactics, insight, milestone]   # draw order, low -> high

# reconcile: { path: navlog.yaml, matched_key: matched_local }   # only with a paper nav log (Tier 2+)

zone_detection:
  band_nm: 10
  collapse_frac: 0.5
  min_traversal_hours: 6
  # zone: { upper_nm: 0, lower_nm: 0 }   # optional authored stage-2 bounds; detection
  #                                        candidates are always logged for audit

finish_spread: { window_min: 30, min_boats: 10 }
noise_floor_min: 30             # margins under this are scoring noise (doctrine 6)

privacy: { build: public }      # public|private — which event cut ships (private inputs never
                                # enter the repo at all; prime rule 4)

output:
  dir: out/
  # generated: 'YYYY-MM-DD'     # pin only to reproduce a frozen build byte-for-byte

pinned_values:                  # pinned at the stage-2 stop (prime rule 3); the I10 categories
  tz_probe: { epoch: 0, rendered: 'YYYY-MM-DD HH:MM' }
  endpoints: { ref: "", corrected_min: 0.0, elapsed_min: 0.0 }
  module_canaries: {}
  names_present: []
  names_absent: []
  names_meta_only: []           # scored-but-trackless boats (mirrors untracked_meta_only)
  finstrip_count: 0
